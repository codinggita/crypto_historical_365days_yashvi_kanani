<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoVerseX API Documentation & Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: rgba(22, 28, 45, 0.65);
      --bg-card-hover: rgba(30, 37, 58, 0.8);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #8b5cf6;
      --primary-gradient: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
      
      --color-get: #10b981;
      --color-post: #3b82f6;
      --color-put: #f59e0b;
      --color-patch: #ec4899;
      --color-delete: #ef4444;
      --color-head: #a855f7;
      --color-options: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(11, 15, 25, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-badge {
      background: var(--primary-gradient);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.25rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35);
    }

    .logo-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-input-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.5rem 1rem;
      width: 450px;
    }

    .auth-input-container span {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      white-space: nowrap;
    }

    .auth-input-container input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      width: 100%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    .main-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 73px);
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: rgba(15, 23, 42, 0.4);
      border-right: 1px solid var(--border-color);
      padding: 1.5rem 1rem;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
      padding-left: 0.5rem;
    }

    .sidebar h3:first-child {
      margin-top: 0;
    }

    .sidebar-item {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sidebar-item:hover, .sidebar-item.active {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .sidebar-item.active {
      border-left: 3px solid var(--primary);
      border-radius: 0 8px 8px 0;
      background: rgba(139, 92, 246, 0.1);
    }

    .content-area {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      display: flex;
      gap: 2rem;
    }

    .routes-section {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .playground-section {
      flex: 0.8;
      position: sticky;
      top: 0;
      height: fit-content;
      max-height: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      backdrop-filter: blur(12px);
    }

    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      border-bottom: 1.5px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    .route-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .route-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .route-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .method-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      text-transform: uppercase;
      min-width: 75px;
      text-align: center;
    }

    .badge-get { background: rgba(16, 185, 129, 0.15); color: var(--color-get); border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-post { background: rgba(59, 130, 246, 0.15); color: var(--color-post); border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge-put { background: rgba(245, 158, 11, 0.15); color: var(--color-put); border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-patch { background: rgba(236, 72, 153, 0.15); color: var(--color-patch); border: 1px solid rgba(236, 72, 153, 0.3); }
    .badge-delete { background: rgba(239, 68, 68, 0.15); color: var(--color-delete); border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-head { background: rgba(168, 85, 247, 0.15); color: var(--color-head); border: 1px solid rgba(168, 85, 247, 0.3); }
    .badge-options { background: rgba(107, 114, 128, 0.15); color: var(--color-options); border: 1px solid rgba(107, 114, 128, 0.3); }

    .route-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-main);
    }

    .route-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* Response & Playground Panel */
    .playground-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
    }

    .playground-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .btn-send {
      background: var(--primary-gradient);
      color: white;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
    }

    .btn-send:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .playground-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .playground-field label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .playground-field input, .playground-field textarea {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.6rem;
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
    }

    .playground-field textarea {
      font-family: 'JetBrains Mono', monospace;
      min-height: 120px;
      resize: vertical;
    }

    .response-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 200px;
      overflow: hidden;
    }

    .response-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .response-status {
      font-weight: 600;
    }

    .status-ok { color: var(--color-get); }
    .status-error { color: var(--color-delete); }

    .response-body {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      flex: 1;
      overflow: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <div class="logo-badge">CX</div>
      <div class="logo-title">CryptoVerseX API Sandbox</div>
    </div>
    <div class="auth-input-container">
      <span>JWT Token:</span>
      <input type="text" id="jwtToken" placeholder="Paste Bearer Token to authorize requests automatically..." value="">
    </div>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <h3>API Categories</h3>
      <div class="sidebar-item active" onclick="showCategory('crud')">Basic CRUD Routes</div>
      <div class="sidebar-item" onclick="showCategory('info')">Coin Info & Params</div>
      <div class="sidebar-item" onclick="showCategory('queries')">Filters & Sorting</div>
      <div class="sidebar-item" onclick="showCategory('analytics')">Analytics & Stats</div>
      <div class="sidebar-item" onclick="showCategory('jwt')">JWT & Auth System</div>
      <div class="sidebar-item" onclick="showCategory('middleware')">Middlewares Demo</div>
    </aside>

    <main class="content-area">
      <section class="routes-section" id="routesList">
        <!-- Rendered dynamically -->
      </section>

      <section class="playground-section">
        <div class="playground-header">
          <div class="playground-title">API Tester Playground</div>
          <button class="btn-send" onclick="sendRequest()">Send Request</button>
        </div>

        <div class="playground-field">
          <label>Endpoint URL</label>
          <input type="text" id="reqUrl" value="">
        </div>

        <div class="playground-field" id="bodyField" style="display: none;">
          <label>JSON Body</label>
          <textarea id="reqBody" placeholder="{}"></textarea>
        </div>

        <div class="response-container">
          <div class="playground-header" style="border: none; padding-bottom: 0.25rem;">
            <div class="playground-title" style="font-size: 0.95rem;">Response</div>
          </div>
          <div class="response-meta">
            <span id="resStatus" class="response-status">Status: --</span>
            <span id="resTime">Time: -- ms</span>
          </div>
          <pre id="resBody" class="response-body">{ "message": "Select a route to begin testing..." }</pre>
        </div>
      </section>
    </main>
  </div>

        { method: "GET", path: "/stats/daily-analysis", desc: "Aggregated stats grouped by day", body: "" },
        { method: "GET", path: "/stats/yearly-analysis", desc: "Aggregated stats grouped by year", body: "" }
      ],
      jwt: [
        { method: "POST", path: "/jwt/generate-token", desc: "Sign and retrieve token", body: '{\n  "email": "user@cryptoverse.com",\n  "password": "User@123456",\n  "role": "user"\n}' },
        { method: "POST", path: "/jwt/verify-token", desc: "Validate JWT authenticity", body: '{\n  "token": "YOUR_JWT_TOKEN_HERE"\n}' },
        { method: "GET", path: "/jwt/profile", desc: "JWT protected profile access", body: "" },
        { method: "GET", path: "/jwt/dashboard", desc: "JWT protected dashboard access", body: "" },
        { method: "GET", path: "/jwt/private-stats", desc: "JWT protected stats access", body: "" },
        { method: "GET", path: "/jwt/admin", desc: "Admin-only role protected route", body: "" },
        { method: "POST", path: "/jwt/refresh-token", desc: "Renew expired JWT token", body: '{\n  "token": "YOUR_EXPIRED_JWT_TOKEN_HERE"\n}' },
        { method: "DELETE", path: "/jwt/revoke-token", desc: "Revoke a JWT token", body: "" },
        { method: "POST", path: "/auth/forgot-password", desc: "Initiates reset password process", body: '{\n  "email": "user@cryptoverse.com"\n}' },
        { method: "POST", path: "/auth/reset-password", desc: "Performs reset password", body: '{\n  "email": "user@cryptoverse.com",\n  "token": "reset-token",\n  "newPassword": "NewUser@123"\n}' },
        { method: "POST", path: "/auth/verify-email", desc: "Verifies user's email address", body: '{\n  "email": "user@cryptoverse.com",\n  "token": "verify-token"\n}' },
        { method: "DELETE", path: "/auth/profile", desc: "Soft deletes authenticated user's own profile", body: "" }
      ],
      middleware: [
        { method: "GET", path: "/middleware/logger", desc: "Demonstrates custom console logging", body: "" },
        { method: "GET", path: "/middleware/auth", desc: "Demonstrates validation barrier (requires JWT header)", body: "" },
        { method: "GET", path: "/middleware/rate-limit", desc: "Demonstrates rate limiter block responses", body: "" },
        { method: "GET", path: "/middleware/error-handler", desc: "Forces an error to showcase global error catching", body: "" }
      ]
    };

    let selectedMethod = "GET";
    let selectedPath = "/coins";

    // Load active category
    function showCategory(catName) {
      document.querySelectorAll(".sidebar-item").forEach(item => item.classList.remove("active"));
      event.target.classList.add("active");

      const routes = ROUTES_DATA[catName] || [];
      const listContainer = document.getElementById("routesList");
      
      let html = `<h2 class="section-title">${event.target.textContent}</h2>`;
      routes.forEach(route => {
        const badgeClass = `badge-${route.method.toLowerCase()}`;
        html += `
          <div class="route-card" onclick="selectRoute('${route.method}', '${route.path}', \`${encodeURIComponent(route.body)}\`)">
            <div class="route-header">
              <span class="method-badge ${badgeClass}">${route.method}</span>
              <span class="route-path">${route.path}</span>
            </div>
            <div class="route-desc">${route.desc}</div>
          </div>
        `;
      });
      listContainer.innerHTML = html;

      // Select first by default
      if (routes.length > 0) {
        selectRoute(routes[0].method, routes[0].path, routes[0].body);
      }
    }

    function selectRoute(method, path, bodyText) {
      selectedMethod = method;
      selectedPath = path;

      // Construct direct local URL
      const host = window.location.origin;
      const apiPrefix = host + "/api/v1";
      document.getElementById("reqUrl").value = apiPrefix + path;

      const bodyField = document.getElementById("bodyField");
      const bodyInput = document.getElementById("reqBody");

      if (method === "GET" || method === "DELETE" || method === "HEAD") {
        bodyField.style.display = "none";
      } else {
        bodyField.style.display = "flex";
        bodyInput.value = bodyText ? decodeURIComponent(bodyText) : "";
      }
    }

    async function sendRequest() {
      const url = document.getElementById("reqUrl").value;
      const token = document.getElementById("jwtToken").value.trim();
      const bodyText = document.getElementById("reqBody").value.trim();
      const resStatus = document.getElementById("resStatus");
      const resTime = document.getElementById("resTime");
      const resBody = document.getElementById("resBody");

      resBody.textContent = "Sending request...";
      resStatus.textContent = "Status: --";
      resTime.textContent = "Time: -- ms";

      const headers = {
        "Content-Type": "application/json"
      };
      if (token) {
        headers["Authorization"] = `Bearer ${token}`;
      }

      const options = {
        method: selectedMethod,
        headers
      };

      if (selectedMethod !== "GET" && selectedMethod !== "HEAD" && bodyText) {
        options.body = bodyText;
      }

      const startTime = performance.now();
      try {
        const response = await fetch(url, options);
        const duration = Math.round(performance.now() - startTime);
        
        resStatus.textContent = `Status: ${response.status} ${response.statusText}`;
        resStatus.className = "response-status " + (response.ok ? "status-ok" : "status-error");
        resTime.textContent = `Time: ${duration} ms`;

        let data;
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          data = await response.json();
          resBody.textContent = JSON.stringify(data, null, 2);
          
          // Auto-capture Token if login or token generate response
          if (data?.data?.token) {
            document.getElementById("jwtToken").value = data.data.token;
            localStorage.setItem("cx_jwt_token", data.data.token);
          } else if (data?.token) {
            document.getElementById("jwtToken").value = data.token;
            localStorage.setItem("cx_jwt_token", data.token);
          }
        } else {
          data = await response.text();
          resBody.textContent = data;
        }
      } catch (error) {
        resStatus.textContent = "Status: Connection Error";
        resStatus.className = "response-status status-error";
        resBody.textContent = error.message;
      }
    }

    // Init Page load
    window.addEventListener("load", () => {
      // Restore cached token
      const cachedToken = localStorage.getItem("cx_jwt_token");
      if (cachedToken) {
        document.getElementById("jwtToken").value = cachedToken;
      }

      // Render default category
      showCategory("crud");
    });
  </script>
</body>
</html>
